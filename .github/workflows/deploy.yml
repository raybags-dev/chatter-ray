name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: chat-deploy-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}
          password: ${{ secrets.DOCKERHUB_TOKEN_PERSONAL }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-chat-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-chat-backend:${{ github.sha }}
          cache-from: type=gha,scope=chat-backend
          cache-to: type=gha,scope=chat-backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          build-args: |
            VITE_WS_URL=wss://raybags.com
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-chat-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-chat-frontend:${{ github.sha }}
          cache-from: type=gha,scope=chat-frontend
          cache-to: type=gha,scope=chat-frontend,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_PERSONAL }}
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: redis://chat-redis:6379/0
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PORTFOLIO_API_URL: https://raybags.com/api/v1
          PORTFOLIO_ADMIN_TOKEN: ${{ secrets.PORTFOLIO_ADMIN_TOKEN }}
          SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,DATABASE_URL,REDIS_URL,GROQ_API_KEY,DISCORD_WEBHOOK,PORTFOLIO_API_URL,PORTFOLIO_ADMIN_TOKEN,SECRET_KEY
          command_timeout: 15m
          script: |
            set -e
            APP_DIR=/opt/raybags-chat
            mkdir -p "$APP_DIR"

            cat > "$APP_DIR/.env.prod" <<ENVEOF
            ENVIRONMENT=production
            DEBUG=false
            SECRET_KEY=${SECRET_KEY}
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=${REDIS_URL}
            GROQ_API_KEY=${GROQ_API_KEY}
            DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
            PORTFOLIO_API_URL=${PORTFOLIO_API_URL}
            PORTFOLIO_ADMIN_TOKEN=${PORTFOLIO_ADMIN_TOKEN}
            CORS_ORIGINS=https://raybags.com
            ENVEOF

            cat > "$APP_DIR/docker-compose.prod.yml" <<COMPOSE_EOF
            services:
              chat-backend:
                image: ${DOCKERHUB_USERNAME}/raybags-chat-backend:${IMAGE_TAG}
                restart: always
                ports:
                  - "8010:8010"
                env_file: .env.prod
                depends_on: [chat-redis]
              chat-frontend:
                image: ${DOCKERHUB_USERNAME}/raybags-chat-frontend:${IMAGE_TAG}
                restart: always
                ports:
                  - "8011:80"
                depends_on: [chat-backend]
              chat-redis:
                image: redis:7-alpine
                restart: always
                ports:
                  - "127.0.0.1:6380:6379"
                command: redis-server --appendonly yes
                volumes:
                  - chat-redis-data:/data
            volumes:
              chat-redis-data:
            COMPOSE_EOF

            cd "$APP_DIR"
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm chat-backend alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Chat deployed — backend:8010  frontend:8011"
